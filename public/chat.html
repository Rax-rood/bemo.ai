<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Chat History</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

:root{
  --bg:#f7f8fa;
  --card:#ffffff;
  --border:#e9edf2;
  --text:#111827;
  --muted:#6b7280;
  --danger:#ef4444;
  --danger-bg:rgba(239,68,68,.09);
}

html,body{height:100%;background:var(--bg);color:var(--text);}

.panel{
  height:100vh;display:flex;flex-direction:column;
  background:white;
}

/* HEAD */
.head{
  padding:20px 18px 14px;
  border-bottom:1px solid var(--border);
  display:flex;flex-direction:column;gap:14px;
  flex:0 0 auto;
}

.head-top{
  display:flex;align-items:center;justify-content:space-between;
}

.head h2{font-size:18px;font-weight:800;}
.head-sub{font-size:12px;color:var(--muted);margin-top:2px;}

.head-actions{display:flex;gap:8px;align-items:center;}

.btn-close{
  width:34px;height:34px;border:none;border-radius:50%;
  background:#f3f4f6;color:#374151;font-size:18px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:.15s;
}
.btn-close:hover{background:#e5e7eb;}

.btn-delete-all{
  border:1px solid var(--border);background:white;
  color:var(--danger);font-size:12px;font-weight:700;
  padding:7px 12px;border-radius:999px;cursor:pointer;
  display:flex;align-items:center;gap:6px;transition:.2s;
}
.btn-delete-all:hover{background:var(--danger-bg);border-color:var(--danger);}
.btn-delete-all svg{width:13px;height:13px;fill:var(--danger);}

/* SEARCH */
.search-wrap{
  position:relative;
}
.search-wrap svg{
  position:absolute;left:12px;top:50%;transform:translateY(-50%);
  width:15px;height:15px;fill:#9ca3af;pointer-events:none;
}
.search-input{
  width:100%;padding:9px 12px 9px 34px;
  border:1px solid var(--border);border-radius:12px;
  background:#f9fafb;font-size:13px;color:var(--text);
  outline:none;transition:.2s;
}
.search-input:focus{border-color:#c7d2fe;background:white;box-shadow:0 0 0 3px rgba(99,102,241,.08);}
.search-input::placeholder{color:#9ca3af;}

/* LIST */
.list{
  padding:12px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:8px;
}

.empty{
  color:var(--muted);font-size:14px;line-height:1.6;
  padding:20px 8px;text-align:center;
}
.empty svg{width:36px;height:36px;fill:#d1d5db;margin-bottom:10px;display:block;margin-left:auto;margin-right:auto;}

/* ITEM */
.item{
  width:100%;border:1px solid var(--border);background:white;
  border-radius:16px;padding:12px 14px;
  cursor:pointer;transition:.2s ease;
  box-shadow:0 4px 14px rgba(0,0,0,.04);
  display:flex;align-items:flex-start;gap:10px;
  position:relative;
}
.item:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(0,0,0,.07);}
.item-body{flex:1;min-width:0;}
.item-title{
  font-size:13px;font-weight:700;color:var(--text);
  margin-bottom:5px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  overflow:hidden;text-align:left;
}
.item-meta{font-size:11px;color:var(--muted);}
.item-count{font-size:11px;color:#6366f1;font-weight:600;margin-top:2px;}

.btn-del-item{
  width:28px;height:28px;border:none;border-radius:50%;
  background:transparent;color:#9ca3af;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:.15s;flex:0 0 auto;
}
.btn-del-item:hover{background:var(--danger-bg);color:var(--danger);}
.btn-del-item svg{width:13px;height:13px;fill:currentColor;}

/* Highlight match */
mark{background:#fef3c7;border-radius:3px;padding:0 1px;}

::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-thumb{background:#e5e7eb;border-radius:20px;}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<div class="panel">
  <div class="head">
    <div class="head-top">
      <div>
        <h2>History</h2>
        <div class="head-sub">Saved on this device</div>
      </div>
      <div class="head-actions">
        <button class="btn-delete-all" onclick="deleteAll()">
          <svg viewBox="0 0 24 24"><path d="M9 3h6l1 1h4v2H4V4h4L9 3ZM5 7h14l-1 13H6L5 7Zm5 2v9h2V9h-2Zm4 0v9h2V9h-2Z"/></svg>
          Delete all
        </button>
        <button class="btn-close" onclick="closePanel()">×</button>
      </div>
    </div>

    <div class="search-wrap">
      <svg viewBox="0 0 24 24"><path d="M10 2a8 8 0 1 0 4.906 14.32l4.387 4.387 1.414-1.414-4.387-4.387A8 8 0 0 0 10 2Zm0 2a6 6 0 1 1 0 12A6 6 0 0 1 10 4Z"/></svg>
      <input class="search-input" id="searchInput" type="text" placeholder="Search chats…" oninput="render()"/>
    </div>
  </div>

  <div class="list" id="list"></div>
</div>

<script>
const STORAGE_KEY = "ai_chats_v2";

function loadChats(){
  try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch{ return []; }
}
function saveChats(c){ localStorage.setItem(STORAGE_KEY, JSON.stringify(c)); }

function formatTime(ts){
  try{
    return new Date(ts).toLocaleString([], {month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"});
  }catch{ return ""; }
}

function escapeHtml(s){
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function highlight(text, query){
  if(!query) return escapeHtml(text);
  const escaped = escapeHtml(text);
  const re = new RegExp("(" + query.replace(/[.*+?^${}()|[\]\\]/g,"\\$&") + ")", "gi");
  return escaped.replace(re, "<mark>$1</mark>");
}

function render(){
  const list = document.getElementById("list");
  const q = document.getElementById("searchInput").value.trim().toLowerCase();
  let chats = loadChats();

  if(q){
    chats = chats.filter(c =>
      c.title.toLowerCase().includes(q) ||
      (c.messages || []).some(m => m.text.toLowerCase().includes(q))
    );
  }

  list.innerHTML = "";

  if(!chats.length){
    list.innerHTML = `
      <div class="empty">
        <svg viewBox="0 0 24 24"><path d="M20 2H4C3 2 2 3 2 4v18l4-4h14c1 0 2-1 2-2V4c0-1-1-2-2-2Zm0 14H5.17L4 17.17V4h16v12Z"/></svg>
        ${q ? "No chats match your search." : "No saved chats yet.<br>Start a conversation and it'll appear here."}
      </div>`;
    return;
  }

  chats.forEach((c, i) => {
    const msgCount = (c.messages || []).length;
    const titleHtml = highlight(c.title, q);

    const item = document.createElement("div");
    item.className = "item";
    item.style.animation = `fadeIn .25s ease ${i * 0.04}s both`;

    item.innerHTML = `
      <div class="item-body">
        <div class="item-title">${titleHtml}</div>
        <div class="item-meta">${formatTime(c.updatedAt || c.createdAt)}</div>
        <div class="item-count">${msgCount} message${msgCount !== 1 ? "s" : ""}</div>
      </div>
      <button class="btn-del-item" title="Delete this chat" onclick="deleteSingle(event,'${c.id}')">
        <svg viewBox="0 0 24 24"><path d="M9 3h6l1 1h4v2H4V4h4L9 3ZM5 7h14l-1 13H6L5 7Zm5 2v9h2V9h-2Zm4 0v9h2V9h-2Z"/></svg>
      </button>
    `;

    item.addEventListener("click", () => loadChat(c.id));
    list.appendChild(item);
  });
}

function loadChat(id){
  window.parent.postMessage({type:"load-chat", id}, "*");
}

function deleteSingle(e, id){
  e.stopPropagation();
  if(!confirm("Delete this chat?")) return;
  const chats = loadChats().filter(c => String(c.id) !== String(id));
  saveChats(chats);
  render();
}

function deleteAll(){
  const chats = loadChats();
  if(!chats.length) return;
  if(!confirm(`Delete all ${chats.length} chat${chats.length > 1 ? "s" : ""}? This cannot be undone.`)) return;
  saveChats([]);
  render();
}

function closePanel(){
  window.parent.postMessage({type:"close-history"}, "*");
}

/* Auto-refresh if parent updates storage */
window.addEventListener("focus", render);

render();
</script>
</body>
</html>
