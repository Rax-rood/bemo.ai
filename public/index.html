<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

:root{
  --bg:#f7f8fa;
  --card:#ffffff;
  --border:#e9edf2;
  --text:#111827;
  --muted:#6b7280;
  --shadow:0 10px 40px rgba(0,0,0,.06);
}

body{height:100vh;background:var(--bg);color:var(--text);overflow:hidden;display:flex;flex-direction:column;}

/* TOP BUTTONS */
.top-actions{
  position:fixed;top:18px;left:18px;
  display:flex;gap:10px;z-index:50;
}

.btn-pill{
  border:1px solid var(--border);
  background:rgba(255,255,255,.92);
  backdrop-filter:blur(14px);
  box-shadow:0 8px 24px rgba(0,0,0,.05);
  color:var(--text);font-size:14px;font-weight:600;
  padding:10px 14px;border-radius:999px;cursor:pointer;
  display:inline-flex;align-items:center;gap:8px;
  transition:.2s ease;
}
.btn-pill:hover{transform:translateY(-1px);box-shadow:0 10px 28px rgba(0,0,0,.08);}
.btn-pill:active{transform:translateY(0);}
.btn-pill svg{width:16px;height:16px;fill:currentColor;}

/* CHAT AREA */
.chat{flex:1;overflow-y:auto;scroll-behavior:smooth;}
.chat-container{
  width:min(760px,95%);margin:auto;
  display:flex;flex-direction:column;gap:18px;
  padding:72px 0 140px;
}

/* ── WELCOME ── */
.welcome{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:0;
  padding:60px 20px 40px;
  animation:fadeUp .7s ease both;
}

.welcome-badge{
  font-size:12px;font-weight:600;letter-spacing:.12em;
  text-transform:uppercase;color:var(--muted);
  margin-bottom:22px;
}

.welcome-headline{
  font-size:clamp(36px,6vw,64px);
  font-weight:800;letter-spacing:-2.5px;
  line-height:1.05;text-align:center;
  color:var(--text);margin-bottom:18px;
}

.welcome-headline em{
  font-style:normal;
  background:linear-gradient(135deg,#6366f1,#8b5cf6,#ec4899);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}

.welcome-sub{
  font-size:17px;color:var(--muted);font-weight:400;
  text-align:center;max-width:440px;line-height:1.65;
  margin-bottom:40px;
}

.welcome-chips{
  display:flex;flex-wrap:wrap;gap:10px;justify-content:center;
  max-width:580px;
}

.chip{
  border:1px solid var(--border);background:white;
  padding:9px 16px;border-radius:999px;
  font-size:13px;font-weight:500;color:var(--text);
  cursor:pointer;transition:.2s;
  box-shadow:0 4px 12px rgba(0,0,0,.04);
}
.chip:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,.08);}

/* MESSAGES */
.message{
  max-width:78%;padding:16px 18px;line-height:1.8;
  font-size:15px;border-radius:24px;
  word-wrap:break-word;animation:slideUp .3s ease;
}
.user{align-self:flex-end;background:white;border:1px solid var(--border);box-shadow:var(--shadow);}
.assistant{align-self:flex-start;background:transparent;}

/* COMPOSER */
.composer{
  position:fixed;left:0;width:100%;padding:16px 20px;
  background:var(--bg);z-index:20;
  transition:top .3s ease,bottom .3s ease,transform .3s ease;
}
body.start-screen .composer{top:66%;bottom:auto;transform:translateY(-50%);}
body.chat-mode .composer{top:auto;bottom:0;transform:none;}

.suggestions-bar{
  width:min(760px,95%);margin:0 auto 10px;
  display:flex;gap:10px;justify-content:center;flex-wrap:wrap;
}
.suggestion-btn{
  border:1px solid var(--border);background:white;
  padding:8px 14px;border-radius:999px;
  font-size:13px;font-weight:600;cursor:pointer;
  transition:.2s;box-shadow:0 4px 12px rgba(0,0,0,.04);
}
.suggestion-btn:hover{transform:translateY(-1px);}

.input-box{
  width:min(760px,95%);margin:auto;background:white;
  border:1px solid var(--border);border-radius:30px;
  box-shadow:0 8px 30px rgba(0,0,0,.06);
  display:flex;align-items:flex-end;gap:10px;padding:10px;
}
.input-box:focus-within{box-shadow:0 12px 34px rgba(0,0,0,.10);}

textarea{
  flex:1;resize:none;border:none;outline:none;background:transparent;
  min-height:28px;max-height:180px;padding:12px 14px;
  font-size:16px;color:var(--text);
}
textarea::placeholder{color:#9ca3af;}

.send-btn{
  width:48px;height:48px;border:none;border-radius:50%;
  background:#111827;color:white;cursor:pointer;
  transition:.25s;display:flex;align-items:center;justify-content:center;flex:0 0 auto;
}
.send-btn:hover{transform:translateY(-2px);}
.send-btn svg{width:18px;height:18px;fill:white;}

/* THINKING */
.thinking{display:flex;gap:7px;align-items:center;height:30px;}
.thinking span{
  width:10px;height:10px;border-radius:50%;background:#4b5563;
  animation:pulse 1.1s infinite;
}
.thinking span:nth-child(2){animation-delay:.15s;}
.thinking span:nth-child(3){animation-delay:.3s;}

/* ERROR */
.error-ui{display:flex;align-items:center;gap:10px;color:#ef4444;font-size:14px;font-weight:500;flex-wrap:wrap;}
.error-ui svg{width:18px;height:18px;fill:#ef4444;flex:0 0 auto;}
.retry-btn{border:none;background:rgba(239,68,68,.1);color:#ef4444;font-size:13px;font-weight:700;padding:8px 12px;border-radius:999px;cursor:pointer;transition:.2s;}
.retry-btn:hover{background:rgba(239,68,68,.16);transform:translateY(-1px);}

/* ── SETTINGS BUTTON bottom-right ── */
.settings-fab{
  position:fixed;bottom:22px;right:22px;z-index:30;
  width:46px;height:46px;border-radius:50%;
  border:1px solid var(--border);
  background:rgba(255,255,255,.92);backdrop-filter:blur(14px);
  box-shadow:0 8px 24px rgba(0,0,0,.08);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:.2s ease;color:var(--text);
}
.settings-fab:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(0,0,0,.12);}
.settings-fab svg{width:20px;height:20px;fill:currentColor;}

/* ── SETTINGS MODAL ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(17,24,39,.25);
  backdrop-filter:blur(4px);opacity:0;pointer-events:none;
  transition:.25s ease;z-index:70;
  display:flex;align-items:center;justify-content:center;
}
.modal-overlay.open{opacity:1;pointer-events:auto;}

.settings-frame{
  width:min(560px,94vw);height:min(480px,88vh);
  border:1px solid var(--border);border-radius:28px;
  overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.18);
  transform:translateY(20px) scale(.97);
  transition:.3s cubic-bezier(.4,0,.2,1);
}
.modal-overlay.open .settings-frame{transform:translateY(0) scale(1);}
.settings-frame iframe{width:100%;height:100%;border:none;display:block;}

/* HISTORY IFRAME MODAL */
.history-overlay{
  position:fixed;inset:0;background:rgba(17,24,39,.25);
  backdrop-filter:blur(4px);opacity:0;pointer-events:none;
  transition:.25s ease;z-index:70;
  display:flex;align-items:center;justify-content:center;
}
.history-overlay.open{opacity:1;pointer-events:auto;}

.history-frame-wrap{
  width:min(420px,94vw);height:min(600px,90vh);
  border:1px solid var(--border);border-radius:28px;
  overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.18);
  transform:translateY(20px) scale(.97);
  transition:.3s cubic-bezier(.4,0,.2,1);
}
.history-overlay.open .history-frame-wrap{transform:translateY(0) scale(1);}
.history-frame-wrap iframe{width:100%;height:100%;border:none;display:block;}

/* ANIMATIONS */
@keyframes pulse{0%,100%{opacity:.3;transform:scale(.7);}50%{opacity:1;transform:scale(1.2);}}
@keyframes slideUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}

::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:20px;}

@media(max-width:700px){
  .welcome-headline{font-size:36px;}
  .message{max-width:92%;}
  body.start-screen .composer{padding:14px;}
  .top-actions{top:12px;left:12px;gap:8px;}
  .btn-pill{padding:9px 12px;font-size:13px;}
  .settings-fab{bottom:16px;right:16px;}
}
</style>
</head>
<body class="start-screen">

<div class="top-actions">
  <button class="btn-pill" type="button" onclick="newChat()">
    <svg viewBox="0 0 24 24"><path d="M13 3H6a3 3 0 0 0-3 3v12a3 3 0 0 0 3 3h12a3 3 0 0 0 3-3v-7h-2v7a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1h7V3Z"/><path d="M21 6h-4V2h-2v4h-4v2h4v4h2V8h4V6Z"/></svg>
    New chat
  </button>
  <button class="btn-pill" type="button" onclick="openHistory()">
    <svg viewBox="0 0 24 24"><path d="M13 3a9 9 0 1 0 8.94 10.02h-2.02A7 7 0 1 1 13 5v2l4-3-4-3v2Z"/><path d="M12 7h2v6l4 2-.94 1.88L12 14V7Z"/></svg>
    History
  </button>
</div>

<div class="chat" id="chat">
  <div class="chat-container" id="messages"></div>
</div>

<div class="composer">
  <div class="suggestions-bar">
    <button class="suggestion-btn" onclick="setSuggestion('Help me write code for ')">Coding</button>
    <button class="suggestion-btn" onclick="setSuggestion('Create an image prompt for ')">Image</button>
    <button class="suggestion-btn" onclick="setSuggestion('Think step by step about ')">Think</button>
  </div>
  <div class="input-box">
    <textarea id="input" placeholder="Message AI…" autofocus></textarea>
    <button class="send-btn" onclick="send()">
      <svg viewBox="0 0 24 24"><path d="M2 21L23 12L2 3V10L17 12L2 14V21Z"/></svg>
    </button>
  </div>
</div>

<!-- Settings FAB -->
<button class="settings-fab" onclick="openSettings()" title="Settings">
  <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58a.5.5 0 0 0 .12-.63l-1.92-3.32a.5.5 0 0 0-.61-.22l-2.39.96a6.97 6.97 0 0 0-1.62-.94l-.36-2.54a.49.49 0 0 0-.49-.42h-3.84a.49.49 0 0 0-.49.42l-.36 2.54a6.97 6.97 0 0 0-1.62.94l-2.39-.96a.49.49 0 0 0-.61.22L2.74 9.85a.48.48 0 0 0 .12.63l2.03 1.58a7.15 7.15 0 0 0 0 1.89L2.86 15.53a.48.48 0 0 0-.12.63l1.92 3.32c.12.22.37.3.61.22l2.39-.96c.5.36 1.04.67 1.62.94l.36 2.54c.06.28.31.48.59.48h3.84c.28 0 .53-.2.59-.48l.36-2.54a6.97 6.97 0 0 0 1.62-.94l2.39.96c.24.08.49 0 .61-.22l1.92-3.32a.48.48 0 0 0-.12-.63l-2.03-1.59ZM12 15.6A3.6 3.6 0 1 1 12 8.4a3.6 3.6 0 0 1 0 7.2Z"/></svg>
</button>

<!-- History iframe modal -->
<div class="history-overlay" id="historyOverlay" onclick="closeHistoryModal(event)">
  <div class="history-frame-wrap" id="historyFrameWrap">
    <iframe id="historyFrame" src="" title="Chat History"></iframe>
  </div>
</div>

<!-- Settings iframe modal -->
<div class="modal-overlay" id="settingsOverlay" onclick="closeSettings(event)">
  <div class="settings-frame" id="settingsFrame">
    <iframe src="settings.html" title="Settings"></iframe>
  </div>
</div>

<script>
const input = document.getElementById("input");
const messages = document.getElementById("messages");
const chat = document.getElementById("chat");
const body = document.body;

const STORAGE_KEY = "ai_chats_v2";

let isSending = false;
let hasSentFirst = false;
let currentChatId = null;
let currentMessages = []; // {role, text}

/* ─── Storage helpers ─── */
function loadChats(){
  try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch{ return []; }
}
function saveChats(chats){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(chats));
}
function upsertChat(id, firstUserMsg, msgs){
  const chats = loadChats();
  const idx = chats.findIndex(c => c.id === id);
  const entry = {
    id,
    title: firstUserMsg.slice(0,80),
    createdAt: idx >= 0 ? chats[idx].createdAt : Date.now(),
    updatedAt: Date.now(),
    messages: msgs
  };
  if(idx >= 0){ chats[idx] = entry; }
  else { chats.unshift(entry); }
  saveChats(chats);
}

/* ─── Mode helpers ─── */
function activateChatMode(){
  if(body.classList.contains("start-screen")){
    body.classList.remove("start-screen");
    body.classList.add("chat-mode");
  }
}

function showWelcome(){
  messages.innerHTML = `
    <div class="welcome">
      <span class="welcome-badge">AI Assistant</span>
      <h1 class="welcome-headline">Think it.<br><em>Ask it.</em></h1>
      <p class="welcome-sub">A clean space to think out loud, write, code, or explore — just start typing.</p>
      <div class="welcome-chips">
        <span class="chip" onclick="setSuggestion('Explain quantum computing in simple terms')">Explain quantum computing</span>
        <span class="chip" onclick="setSuggestion('Write a Python script to ')">Write a Python script</span>
        <span class="chip" onclick="setSuggestion('Help me brainstorm ideas for ')">Brainstorm ideas</span>
        <span class="chip" onclick="setSuggestion('Translate this to French: ')">Translate to French</span>
        <span class="chip" onclick="setSuggestion('Debug this code: ')">Debug code</span>
      </div>
    </div>`;
}

function newChat(){
  currentChatId = null;
  currentMessages = [];
  isSending = false;
  hasSentFirst = false;
  messages.innerHTML = "";
  showWelcome();
  body.classList.remove("chat-mode");
  body.classList.add("start-screen");
  input.value = "";
  input.style.height = "auto";
  input.focus();
  chat.scrollTop = 0;
  closeHistoryModal();
}

/* ─── History modal ─── */
function openHistory(){
  const overlay = document.getElementById("historyOverlay");
  const frame = document.getElementById("historyFrame");
  frame.src = "chat.html";
  overlay.classList.add("open");
}
function closeHistoryModal(e){
  if(!e || !document.getElementById("historyFrameWrap").contains(e.target)){
    document.getElementById("historyOverlay").classList.remove("open");
    document.getElementById("historyFrame").src = "";
  }
}

/* Listen for messages from chat.html iframe */
window.addEventListener("message", (e) => {
  if(e.data && e.data.type === "load-chat"){
    loadChatById(e.data.id);
    closeHistoryModal();
  }
  if(e.data && e.data.type === "close-history"){
    closeHistoryModal();
  }
});

function loadChatById(id){
  const chats = loadChats();
  const chat_item = chats.find(c => c.id === id);
  if(!chat_item) return;

  currentChatId = id;
  currentMessages = chat_item.messages || [];
  hasSentFirst = true;
  messages.innerHTML = "";
  activateChatMode();

  currentMessages.forEach(m => {
    const el = document.createElement("div");
    el.className = "message " + m.role;
    el.textContent = m.text;
    messages.appendChild(el);
  });
  chat.scrollTop = chat.scrollHeight;
}

/* ─── Settings modal ─── */
function openSettings(){
  document.getElementById("settingsOverlay").classList.add("open");
}
function closeSettings(e){
  if(!document.getElementById("settingsFrame").contains(e.target)){
    document.getElementById("settingsOverlay").classList.remove("open");
  }
}
window.addEventListener("message", (e) => {
  if(e.data && e.data.type === "close-settings"){
    document.getElementById("settingsOverlay").classList.remove("open");
  }
});

/* ─── Composer ─── */
function setSuggestion(text){
  input.value = text;
  input.focus();
  input.dispatchEvent(new Event("input"));
}

input.addEventListener("input", () => {
  input.style.height = "auto";
  input.style.height = input.scrollHeight + "px";
  if(input.value.trim()) activateChatMode();
});
input.addEventListener("keydown", e => {
  if(e.key === "Enter" && !e.shiftKey){ e.preventDefault(); send(); }
});

function addMessage(role, text){
  const el = document.createElement("div");
  el.className = "message " + role;
  el.textContent = text;
  messages.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
  return el;
}

function createThinkingEl(){
  const el = document.createElement("div");
  el.className = "message assistant";
  el.innerHTML = `<div class="thinking"><span></span><span></span><span></span></div>`;
  messages.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
  return el;
}

function typeText(el, text, speed=16){
  let i = 0;
  el.textContent = "";
  function tick(){
    if(i < text.length){
      el.textContent += text[i++];
      chat.scrollTop = chat.scrollHeight;
      setTimeout(tick, speed);
    }
  }
  tick();
}

async function send(){
  const text = input.value.trim();
  if(!text || isSending) return;

  // Remove welcome on first message
  const welcomeEl = messages.querySelector(".welcome");
  if(welcomeEl) welcomeEl.remove();
  activateChatMode();

  isSending = true;
  hasSentFirst = true;

  if(!currentChatId) currentChatId = Date.now() + Math.random();

  addMessage("user", text);
  currentMessages.push({role:"user", text});

  input.value = "";
  input.style.height = "auto";

  const botEl = createThinkingEl();

  try{
    const res = await fetch("/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:text})
    });
    if(!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    const reply = data.reply || "No response";

    currentMessages.push({role:"assistant", text:reply});
    upsertChat(currentChatId, currentMessages[0].text, currentMessages);

    typeText(botEl, reply);
  }catch(err){
    botEl.innerHTML = "";
    const errDiv = document.createElement("div");
    errDiv.className = "error-ui";
    errDiv.innerHTML = `<svg viewBox="0 0 24 24"><path d="M12 2L1 21H23L12 2ZM13 18H11V16H13V18ZM13 14H11V10H13V14Z"/></svg><span>Unable to get response.</span>`;
    const retryBtn = document.createElement("button");
    retryBtn.className = "retry-btn";
    retryBtn.textContent = "Retry";
    retryBtn.onclick = () => { botEl.remove(); currentMessages.pop(); send(); };
    errDiv.appendChild(retryBtn);
    botEl.appendChild(errDiv);
    console.error(err);
  }finally{
    isSending = false;
  }
}

/* init */
showWelcome();
</script>
</body>
</html>
