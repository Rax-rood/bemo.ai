<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

:root{
    --bg:#f7f8fa;
    --card:#ffffff;
    --border:#e9edf2;
    --text:#111827;
    --muted:#6b7280;
    --shadow:0 10px 40px rgba(0,0,0,.06);
    --danger:#ef4444;
}

body{
    height:100vh;
    background:var(--bg);
    color:var(--text);
    overflow:hidden;
}

body::before{
    content:"";
    position:fixed;
    top:-300px;
    left:50%;
    transform:translateX(-50%);
    width:900px;
    height:900px;
    background:radial-gradient(circle, rgba(255,255,255,.9), transparent 70%);
    pointer-events:none;
}

/* =========================
   APP STATES
========================= */

.app{
    height:100vh;
    display:flex;
    flex-direction:column;
}

body.start-screen .composer{
    top:66%;
    bottom:auto;
    transform:translateY(-50%);
    padding:20px;
}

body.start-screen .input-box{
    width:min(900px,95%);
    max-width:760px;
}

body.chat-mode .composer{
    top:auto;
    bottom:0;
    transform:none;
}

/* =========================
   TOP BUTTONS
========================= */

.new-chat-btn,
.integrations-btn{
    position:fixed;
    top:18px;
    border:1px solid var(--border);
    background:rgba(255,255,255,.92);
    backdrop-filter:blur(14px);
    box-shadow:0 8px 24px rgba(0,0,0,.05);
    color:var(--text);
    font-size:14px;
    font-weight:600;
    padding:10px 14px;
    border-radius:999px;
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    gap:8px;
    transition:.2s ease;
    z-index:50;
}

.new-chat-btn{
    left:18px;
}

.integrations-btn{
    right:18px;
}

.new-chat-btn:hover,
.integrations-btn:hover{
    transform:translateY(-1px);
    box-shadow:0 10px 28px rgba(0,0,0,.08);
}

.new-chat-btn:active,
.integrations-btn:active{
    transform:translateY(0);
}

.new-chat-btn svg,
.integrations-btn svg{
    width:16px;
    height:16px;
    fill:currentColor;
}

/* =========================
   CHAT
========================= */

.chat{
    flex:1;
    overflow-y:auto;
    scroll-behavior:smooth;
    opacity:1;
    transform:none;
    transition:opacity .25s ease, transform .25s ease;
}

.chat-container{
    width:min(900px,95%);
    margin:auto;
    display:flex;
    flex-direction:column;
    gap:20px;
    padding:72px 0 140px;
}

/* =========================
   WELCOME PREVIEW
========================= */

.welcome{
    text-align:center;
    margin-top:10vh;
    animation:fadeIn .8s ease;
}

.welcome h1{
    font-size:56px;
    font-weight:800;
    letter-spacing:-2px;
    margin-bottom:14px;
}

.welcome p{
    color:var(--muted);
    font-size:18px;
}

.welcome-preview{
    margin:26px auto 0;
    width:min(620px,100%);
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
}

.preview-card{
    background:rgba(255,255,255,.8);
    border:1px solid var(--border);
    border-radius:18px;
    padding:16px;
    text-align:left;
    box-shadow:0 8px 26px rgba(0,0,0,.04);
    backdrop-filter:blur(10px);
}

.preview-card h3{
    font-size:14px;
    font-weight:700;
    margin-bottom:6px;
}

.preview-card p{
    font-size:13px;
    line-height:1.5;
    color:var(--muted);
}

@media(max-width:700px){
    .welcome-preview{
        grid-template-columns:1fr;
    }
}

/* =========================
   MESSAGE
========================= */

.message{
    max-width:78%;
    padding:16px 18px;
    line-height:1.8;
    font-size:15px;
    border-radius:24px;
    word-wrap:break-word;
    animation:slideUp .35s ease;
}

.user{
    align-self:flex-end;
    background:white;
    border:1px solid var(--border);
    box-shadow:var(--shadow);
}

.assistant{
    align-self:flex-start;
    background:transparent;
    color:var(--text);
}

/* =========================
   ASSISTANT ERROR + RETRY
========================= */

.error-ui{
    display:flex;
    align-items:center;
    gap:10px;
    color:var(--danger);
    font-size:14px;
    font-weight:500;
    flex-wrap:wrap;
}

.error-ui svg{
    width:18px;
    height:18px;
    fill:var(--danger);
    flex:0 0 auto;
}

.retry-btn{
    border:none;
    background:rgba(239,68,68,.1);
    color:var(--danger);
    font-size:13px;
    font-weight:700;
    padding:8px 12px;
    border-radius:999px;
    cursor:pointer;
    transition:.2s;
}

.retry-btn:hover{
    background:rgba(239,68,68,.16);
    transform:translateY(-1px);
}

.retry-btn:active{
    transform:translateY(0);
}

/* =========================
   COMPOSER
========================= */

.composer{
    position:fixed;
    left:0;
    width:100%;
    padding:20px;
    background:var(--bg);
    transition:top .35s ease, bottom .35s ease, transform .35s ease;
    z-index:20;
}

.input-box{
    width:min(900px,95%);
    margin:auto;
    background:white;
    border:1px solid var(--border);
    border-radius:30px;
    box-shadow:0 8px 30px rgba(0,0,0,.06);
    display:flex;
    align-items:flex-end;
    gap:10px;
    padding:10px;
    transition:width .25s ease, box-shadow .25s ease;
}

.input-box:focus-within{
    box-shadow:0 12px 34px rgba(0,0,0,.10);
}

textarea{
    flex:1;
    resize:none;
    border:none;
    outline:none;
    background:transparent;
    min-height:28px;
    max-height:180px;
    padding:12px 14px;
    font-size:16px;
    color:var(--text);
}

textarea::placeholder{
    color:#9ca3af;
}

.send-btn{
    width:48px;
    height:48px;
    border:none;
    border-radius:50%;
    background:#111827;
    color:white;
    cursor:pointer;
    transition:.25s;
    display:flex;
    align-items:center;
    justify-content:center;
    flex:0 0 auto;
}

.send-btn:hover{
    transform:translateY(-2px);
}

.send-btn:active{
    transform:translateY(0);
}

.send-btn svg{
    width:18px;
    height:18px;
    fill:white;
}

/* =========================
   SLIDE PANEL
========================= */

.panel-overlay{
    position:fixed;
    inset:0;
    background:rgba(17,24,39,.20);
    backdrop-filter:blur(2px);
    opacity:0;
    pointer-events:none;
    transition:.25s ease;
    z-index:55;
}

.panel-overlay.open{
    opacity:1;
    pointer-events:auto;
}

.integration-panel{
    position:fixed;
    top:0;
    right:0;
    height:100vh;
    width:min(380px, 20vw);
    min-width:260px;
    max-width:92vw;
    background:rgba(255,255,255,.96);
    border-left:1px solid var(--border);
    box-shadow:-18px 0 50px rgba(0,0,0,.10);
    transform:translateX(100%);
    transition:transform .28s ease;
    z-index:60;
    overflow:hidden;
}

.integration-panel.open{
    transform:translateX(0);
}

.integration-frame{
    width:100%;
    height:100%;
    border:0;
    display:block;
    background:white;
}

/* =========================
   THINKING
========================= */

.thinking{
    display:flex;
    gap:7px;
    align-items:center;
    height:30px;
}

.thinking span{
    width:10px;
    height:10px;
    border-radius:50%;
    background:#4b5563;
    animation:pulse 1.1s infinite;
}

.thinking span:nth-child(2){
    animation-delay:.15s;
}

.thinking span:nth-child(3){
    animation-delay:.3s;
}

/* =========================
   ANIMATIONS
========================= */

@keyframes pulse{
    0%,100%{
        opacity:.3;
        transform:scale(.7);
    }
    50%{
        opacity:1;
        transform:scale(1.2);
    }
}

@keyframes slideUp{
    from{
        opacity:0;
        transform:translateY(14px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

::-webkit-scrollbar{
    width:8px;
}

::-webkit-scrollbar-thumb{
    background:#d7dce3;
    border-radius:20px;
}

/* =========================
   RESPONSIVE
========================= */

@media(max-width:700px){
    .welcome h1{
        font-size:40px;
    }

    .message{
        max-width:92%;
    }

    body.start-screen .composer{
        padding:16px;
    }

    .new-chat-btn,
    .integrations-btn{
        top:12px;
        padding:9px 12px;
        font-size:13px;
    }

    .new-chat-btn{
        left:12px;
    }

    .integrations-btn{
        right:12px;
    }

    .integration-panel{
        width:82vw;
        min-width:0;
    }
}
</style>
</head>
<body class="start-screen">

<button class="new-chat-btn" type="button" onclick="newChat()">
    <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M13 3H6a3 3 0 0 0-3 3v12a3 3 0 0 0 3 3h12a3 3 0 0 0 3-3v-7h-2v7a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1h7V3Z"/>
        <path d="M21 6h-4V2h-2v4h-4v2h4v4h2V8h4V6Z"/>
    </svg>
    New chat
</button>

<button class="integrations-btn" type="button" onclick="togglePanel()">
    <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2Zm0 4-8 5L4 8V6l8 5 8-5v2Z"/>
    </svg>
    Integrations
</button>

<div class="app">

    <div class="chat" id="chat">
        <div class="chat-container" id="messages">
            <div class="welcome" id="welcome">
                <h1>AI Assistant</h1>
                <p>Ask anything and get intelligent answers.</p>

                <div class="welcome-preview">
                    <div class="preview-card">
                        <h3>Write a message</h3>
                        <p>Start typing in the box below to begin a conversation.</p>
                    </div>
                    <div class="preview-card">
                        <h3>Ask for help</h3>
                        <p>Try asking for code, ideas, summaries, or explanations.</p>
                    </div>
                    <div class="preview-card">
                        <h3>Retry on error</h3>
                        <p>If a reply fails, a retry button appears next to the message.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="composer">
        <div class="input-box">
            <textarea
                id="input"
                placeholder="Message AI..."
                autofocus
            ></textarea>

            <button class="send-btn" onclick="send()">
                <svg viewBox="0 0 24 24">
                    <path d="M2 21L23 12L2 3V10L17 12L2 14V21Z"/>
                </svg>
            </button>
        </div>
    </div>

</div>

<div class="panel-overlay" id="panelOverlay" onclick="togglePanel(false)"></div>

<aside class="integration-panel" id="integrationPanel" aria-label="Integrations panel">
    <iframe
        class="integration-frame"
        src="integration.html"
        title="Integration panel"
    ></iframe>
</aside>

<script>
const input = document.getElementById("input");
const messages = document.getElementById("messages");
const chat = document.getElementById("chat");
let welcome = document.getElementById("welcome");
const body = document.body;
const panel = document.getElementById("integrationPanel");
const panelOverlay = document.getElementById("panelOverlay");

let isSending = false;
let hasSentFirstMessage = false;
let panelOpen = false;

function activateChatMode(){
    if(body.classList.contains("start-screen")){
        body.classList.remove("start-screen");
        body.classList.add("chat-mode");
    }
}

function showWelcome(){
    messages.innerHTML = `
        <div class="welcome" id="welcome">
            <h1>Bemo</h1>
            <p>Ask anything and get intelligent answers.</p>

            <div class="welcome-preview">
                <div class="preview-card">
                    <h3>Write a message</h3>
                    <p>Start typing in the box below to begin a conversation.</p>
                </div>
                <div class="preview-card">
                    <h3>Ask for help</h3>
                    <p>Try asking for code, ideas, summaries, or explanations.</p>
                </div>
                <div class="preview-card">
                    <h3>Retry on error</h3>
                    <p>If a reply fails, a retry button appears next to the message.</p>
                </div>
            </div>
        </div>
    `;
    welcome = document.getElementById("welcome");
}

function hideWelcomeIfNeeded(){
    if(!hasSentFirstMessage && welcome){
        welcome.remove();
        welcome = null;
    }
}

function newChat(){
    messages.innerHTML = "";
    showWelcome();

    body.classList.remove("chat-mode");
    body.classList.add("start-screen");

    input.value = "";
    input.style.height = "auto";
    input.focus();

    isSending = false;
    hasSentFirstMessage = false;

    chat.scrollTop = 0;
}

function togglePanel(force){
    panelOpen = typeof force === "boolean" ? force : !panelOpen;
    panel.classList.toggle("open", panelOpen);
    panelOverlay.classList.toggle("open", panelOpen);
}

input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = input.scrollHeight + "px";

    if(input.value.trim().length > 0){
        activateChatMode();
    }
});

input.addEventListener("keydown", (e) => {
    if(e.key === "Enter" && !e.shiftKey){
        e.preventDefault();
        send();
    }
});

function typeText(element, text, speed = 18){
    let i = 0;

    function typing(){
        if(i < text.length){
            element.textContent += text.charAt(i);
            chat.scrollTop = chat.scrollHeight;
            i++;
            setTimeout(typing, speed);
        }
    }

    typing();
}

function createThinking(){
    return `
    <div class="thinking">
        <span></span>
        <span></span>
        <span></span>
    </div>
    `;
}

function createErrorUI(retryHandler){
    const wrap = document.createElement("div");
    wrap.className = "error-ui";

    wrap.innerHTML = `
        <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 2L1 21H23L12 2ZM13 18H11V16H13V18ZM13 14H11V10H13V14Z"/>
        </svg>
        <span>Unable to generate response</span>
    `;

    const retryBtn = document.createElement("button");
    retryBtn.className = "retry-btn";
    retryBtn.type = "button";
    retryBtn.textContent = "Retry";
    retryBtn.addEventListener("click", retryHandler);

    wrap.appendChild(retryBtn);
    return wrap;
}

async function send(){
    const text = input.value.trim();
    if(!text || isSending) return;

    activateChatMode();
    hideWelcomeIfNeeded();
    isSending = true;
    hasSentFirstMessage = true;

    const userMsg = document.createElement("div");
    userMsg.className = "message user";
    userMsg.textContent = text;
    messages.appendChild(userMsg);

    input.value = "";
    input.style.height = "auto";
    chat.scrollTop = chat.scrollHeight;

    const botMsg = document.createElement("div");
    botMsg.className = "message assistant";
    botMsg.innerHTML = createThinking();
    messages.appendChild(botMsg);
    chat.scrollTop = chat.scrollHeight;

    try{
        const res = await fetch("/chat", {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({ message:text })
        });

        if(!res.ok){
            throw new Error(`HTTP error ${res.status}`);
        }

        const data = await res.json();

        botMsg.textContent = "";
        const output = data.reply || "No response";
        typeText(botMsg, output, 16);

    }catch(err){
        botMsg.innerHTML = "";
        botMsg.appendChild(createErrorUI(() => retryMessage(botMsg, text)));
        console.error(err);
    }finally{
        isSending = false;
        chat.scrollTop = chat.scrollHeight;
    }
}

async function retryMessage(botMsg, text){
    if(isSending) return;

    isSending = true;
    activateChatMode();

    botMsg.innerHTML = createThinking();
    chat.scrollTop = chat.scrollHeight;

    try{
        const res = await fetch("/chat", {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({ message:text })
        });

        if(!res.ok){
            throw new Error(`HTTP error ${res.status}`);
        }

        const data = await res.json();

        botMsg.textContent = "";
        const output = data.reply || "No response";
        typeText(botMsg, output, 16);

    }catch(err){
        botMsg.innerHTML = "";
        botMsg.appendChild(createErrorUI(() => retryMessage(botMsg, text)));
        console.error(err);
    }finally{
        isSending = false;
        chat.scrollTop = chat.scrollHeight;
    }
}

showWelcome();
</script>

</body>
</html>
