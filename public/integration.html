<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Integrations</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    :root {
      --bg: #f7f8fa;
      --card: rgba(255, 255, 255, 0.92);
      --border: #e9edf2;
      --text: #111827;
      --muted: #6b7280;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
      --accent: #111827;
      --active-bg: rgba(17, 24, 39, 0.06);
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      padding: 18px;
    }

    .wrap {
      max-width: 420px;
      margin: 0 auto;
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .title {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }

    .badge {
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      background: rgba(17, 24, 39, 0.08);
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      white-space: nowrap;
    }

    .section {
      margin-top: 16px;
    }

    .section-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }

    .tool-list {
      display: grid;
      gap: 10px;
    }

    .tool {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--card);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: 0.2s ease;
      text-align: left;
    }

    .tool:hover {
      transform: translateY(-1px);
    }

    .tool.active {
      border-color: rgba(17, 24, 39, 0.18);
      background: var(--active-bg);
    }

    .icon {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: white;
      border: 1px solid var(--border);
      flex: 0 0 auto;
    }

    .icon svg {
      width: 20px;
      height: 20px;
      fill: var(--accent);
    }

    .tool-content {
      flex: 1;
      min-width: 0;
    }

    .tool-name {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .tool-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.4;
    }

    .tool-meta {
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
      flex: 0 0 auto;
    }

    .default-note {
      margin-top: 14px;
      padding: 14px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.8);
      border-radius: 16px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .default-note strong {
      color: var(--text);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div>
        <div class="title">Integrations</div>
        <div class="subtitle">Choose a tool to connect your assistant</div>
      </div>
      <div class="badge">Default: Email</div>
    </div>

    <section class="section">
      <div class="section-label">Available tools</div>
      <div class="tool-list">
        <button class="tool active" type="button">
          <div class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2Zm0 4-8 5L4 8V6l8 5 8-5v2Z"/>
            </svg>
          </div>
          <div class="tool-content">
            <div class="tool-name">Email</div>
            <div class="tool-desc">Send and manage messages through your email integration.</div>
          </div>
          <div class="tool-meta">Default</div>
        </button>

        <button class="tool" type="button">
          <div class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M12 2a10 10 0 1 0 10 10A10.011 10.011 0 0 0 12 2Zm1 15h-2v-6h2Zm0-8h-2V7h2Z"/>
            </svg>
          </div>
          <div class="tool-content">
            <div class="tool-name">Notifications</div>
            <div class="tool-desc">Receive alerts and updates from connected services.</div>
          </div>
          <div class="tool-meta">Soon</div>
        </button>

        <button class="tool" type="button">
          <div class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M4 4h16v12H5.17L4 17.17V4Zm3 3v2h10V7H7Zm0 4v2h7v-2H7Z"/>
            </svg>
          </div>
          <div class="tool-content">
            <div class="tool-name">Chat</div>
            <div class="tool-desc">Connect conversation tools for live messaging workflows.</div>
          </div>
          <div class="tool-meta">Soon</div>
        </button>

        <button class="tool" type="button">
          <div class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M13 3H6a3 3 0 0 0-3 3v12a3 3 0 0 0 3 3h12a3 3 0 0 0 3-3v-7h-2v7a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1h7V3Z"/>
              <path d="M21 6h-4V2h-2v4h-4v2h4v4h2V8h4V6Z"/>
            </svg>
          </div>
          <div class="tool-content">
            <div class="tool-name">Task Actions</div>
            <div class="tool-desc">Trigger actions like create, update, and route tasks.</div>
          </div>
          <div class="tool-meta">Soon</div>
        </button>
      </div>

      <div class="default-note">
        <strong>Email</strong> is the active default integration. This page is ready to be loaded inside your right-side panel.
      </div>
    </section>
  </main>
</body>
</html>
